name: Integrated DevSecOps CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  LOCAL_IMAGE_NAME: youtube-music-bot:ci-test

jobs:
  # ============================================================
  # Track A：Pre-Build Checks
  #
  # 包含：
  # - Format Check：靜態格式檢查
  # - Lint Check：靜態語法 / 風格檢查
  # - Unit Test：動態功能測試
  # - Integration Test：動態整合測試
  # - SAST：靜態安全測試
  #
  # 特點：
  # - 不依賴 Docker image
  # - 可以和 SCA-Source、Build 平行執行
  # ============================================================
  pre_build_checks:
    name: "Track A › Pre-Build Checks"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            (cd frontend && (npm ci || npm install))
          fi

      # ------------------------------------------------------------
      # Format Check
      # ------------------------------------------------------------
      - name: Format Check
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['format:check'] ? 0 : 1)" 2>/dev/null; then
            bun run format:check
          else
            echo "No root format:check script found. Skipping root format check."
          fi

          if [ -d "frontend" ]; then
            if node -e "const p=require('./frontend/package.json'); process.exit(p.scripts && p.scripts['format:check'] ? 0 : 1)" 2>/dev/null; then
              (cd frontend && npm run format:check)
            else
              echo "No frontend format:check script found. Skipping frontend format check."
            fi
          fi

      # ------------------------------------------------------------
      # Lint Check
      # ------------------------------------------------------------
      - name: Lint Check
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)" 2>/dev/null; then
            bun run lint
          else
            echo "No root lint script found. Skipping root lint."
          fi

          if [ -d "frontend" ]; then
            if node -e "const p=require('./frontend/package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)" 2>/dev/null; then
              (cd frontend && npm run lint)
            else
              echo "No frontend lint script found. Skipping frontend lint."
            fi
          fi

      # ------------------------------------------------------------
      # Unit Test
      # Unit Test 是開發者根據專案邏輯撰寫的測試案例
      # CI 只負責自動執行
      # ------------------------------------------------------------
      - name: Unit Tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            bun run test
          else
            echo "No root test script found. Skipping root unit tests."
          fi

          if [ -d "frontend" ]; then
            if node -e "const p=require('./frontend/package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
              (cd frontend && npm test)
            else
              echo "No frontend test script found. Skipping frontend unit tests."
            fi
          fi

      # ------------------------------------------------------------
      # Integration Test
      # ------------------------------------------------------------
      - name: Integration Tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:integration'] ? 0 : 1)" 2>/dev/null; then
            bun run test:integration
          else
            echo "No root test:integration script found. Skipping integration tests."
          fi

      # ------------------------------------------------------------
      # SAST - Semgrep
      # ------------------------------------------------------------
      - name: Set up Python for Semgrep
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run Semgrep SAST scan
        run: |
          semgrep \
            --config=p/owasp-top-ten \
            --config=p/javascript \
            --config=p/typescript \
            --config=p/react \
            --config=p/docker \
            --config=p/github-actions \
            --json \
            --output=semgrep-report.json \
            . || true

      - name: Show Pre-Build Checks Summary
        if: always()
        run: |
          echo "## Pre-Build Checks Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Included checks" >> "$GITHUB_STEP_SUMMARY"
          echo "- Format Check" >> "$GITHUB_STEP_SUMMARY"
          echo "- Lint Check" >> "$GITHUB_STEP_SUMMARY"
          echo "- Unit Test" >> "$GITHUB_STEP_SUMMARY"
          echo "- Integration Test" >> "$GITHUB_STEP_SUMMARY"
          echo "- SAST with Semgrep" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path

          report_path = Path("semgrep-report.json")
          if not report_path.exists():
              print("Semgrep report was not generated.")
              raise SystemExit(0)

          with report_path.open("r", encoding="utf-8") as f:
              data = json.load(f)

          results = data.get("results", [])
          print("### Semgrep findings")
          print("")
          print(f"Total findings: **{len(results)}**")
          print("")

          if results:
              print("| No. | Rule | File | Line | Message |")
              print("|---:|---|---|---:|---|")
              for i, r in enumerate(results[:20], start=1):
                  rule = r.get("check_id", "")
                  path = r.get("path", "")
                  line = r.get("start", {}).get("line", "")
                  msg = r.get("extra", {}).get("message", "")
                  msg = msg.replace("|", "\\|").replace("\n", " ")
                  print(f"| {i} | `{rule}` | `{path}` | {line} | {msg} |")
          else:
              print("No Semgrep findings were detected.")
          PY

      - name: Upload Pre-Build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-build-reports
          path: |
            semgrep-report.json
          if-no-files-found: warn

  # ============================================================
  # Track B：SCA-Source
  #
  # Build 前的 SCA
  # 掃描 source dependency，產生 source SBOM
  #
  # 工具：
  # - Snyk：dependency vulnerability scan
  # - Syft：產生 SBOM
  # - Grype：根據 SBOM 掃漏洞
  # ============================================================
  sca_source:
    name: "Track B › SCA-Source"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            (cd frontend && (npm ci || npm install))
          fi

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk SCA scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -z "$SNYK_TOKEN" ]; then
            echo '{"message":"SNYK_TOKEN is not set. Skipping Snyk scan."}' > snyk-sca-report.json
            exit 0
          fi

          snyk auth "$SNYK_TOKEN"

          snyk test \
            --all-projects \
            --severity-threshold=high \
            --json-file-output=snyk-sca-report.json \
            || true

      - name: Install Syft and Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate source SBOM with Syft
        run: |
          syft dir:. -o cyclonedx-json=sbom-source-cyclonedx.json

      - name: Run Grype scan from source SBOM
        run: |
          grype sbom:sbom-source-cyclonedx.json -o json > grype-source-sbom-report.json || true

      - name: Show SCA-Source Summary
        if: always()
        run: |
          echo "## SCA-Source Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Generated files" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`snyk-sca-report.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`sbom-source-cyclonedx.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`grype-source-sbom-report.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          from pathlib import Path
          from collections import Counter

          sbom_path = Path("sbom-source-cyclonedx.json")
          if sbom_path.exists():
              with sbom_path.open("r", encoding="utf-8") as f:
                  sbom = json.load(f)
              components = sbom.get("components", [])
              print(f"Total source SBOM components: **{len(components)}**")
              print("")
          else:
              print("Source SBOM file was not generated.")
              print("")

          report_path = Path("grype-source-sbom-report.json")
          if not report_path.exists():
              print("Grype source report was not generated.")
              raise SystemExit(0)

          with report_path.open("r", encoding="utf-8") as f:
              data = json.load(f)

          matches = data.get("matches", [])
          print(f"Total Grype source findings: **{len(matches)}**")
          print("")

          if matches:
              severities = Counter(
                  m.get("vulnerability", {}).get("severity", "Unknown")
                  for m in matches
              )

              print("| Severity | Count |")
              print("|---|---:|")
              for sev, count in severities.items():
                  print(f"| {sev} | {count} |")

              print("")
              print("### Findings preview")
              print("")
              print("| No. | Package | Version | Vulnerability | Severity |")
              print("|---:|---|---|---|---|")

              for i, m in enumerate(matches[:20], start=1):
                  artifact = m.get("artifact", {})
                  vuln = m.get("vulnerability", {})
                  print(
                      f"| {i} | `{artifact.get('name', '')}` | "
                      f"`{artifact.get('version', '')}` | "
                      f"`{vuln.get('id', '')}` | "
                      f"{vuln.get('severity', '')} |"
                  )
          else:
              print("No Grype source vulnerabilities were detected.")
          PY

      - name: Upload SCA-Source reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-source-reports
          path: |
            snyk-sca-report.json
            sbom-source-cyclonedx.json
            grype-source-sbom-report.json
          if-no-files-found: warn

  # ============================================================
  # Track C：Build
  #
  # 與 Pre-Build Checks、SCA-Source 平行執行
  # 產出 Docker image artifact 給：
  # - SCA-Image
  # - DAST
  # - E2E
  # ============================================================
  build:
    name: "Track C › Build App and Docker Image"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies
        run: |
          if [ -d "frontend" ]; then
            (cd frontend && (npm ci || npm install))
          fi

      - name: Build application
        run: npm run build:all

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.LOCAL_IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image to tar
        run: docker save -o docker-image.tar ${{ env.LOCAL_IMAGE_NAME }}

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          retention-days: 1

      - name: Show Build Summary
        if: always()
        run: |
          echo "## Build Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build application with \`npm run build:all\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build Docker image locally" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local image: \`${{ env.LOCAL_IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Push to Docker Hub: **false**" >> "$GITHUB_STEP_SUMMARY"

  # ============================================================
  # Track D：SCA-Image
  #
  # 需要 Build 後的 Docker image
  # 掃描 image 內實際包含的 OS packages / runtime dependencies
  # ============================================================
  sca_image:
    name: "Track D › SCA-Image"
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i docker-image.tar

      - name: Install Syft and Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Generate image SBOM with Syft
        run: |
          syft ${{ env.LOCAL_IMAGE_NAME }} -o cyclonedx-json=sbom-image-cyclonedx.json

      - name: Run Grype scan from image SBOM
        run: |
          grype sbom:sbom-image-cyclonedx.json -o json > grype-image-sbom-report.json || true

      - name: Upload SCA-Image reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sca-image-reports
          path: |
            sbom-image-cyclonedx.json
            grype-image-sbom-report.json
          if-no-files-found: warn

  # ============================================================
  # Track E：DAST
  #
  # 使用 Build 後的 Docker image 啟動服務
  # 再由 OWASP ZAP 做動態安全掃描
  # ============================================================
  dast:
    name: "Track E › DAST with OWASP ZAP"
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      issues: write

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i docker-image.tar

      - name: Start application container
        run: |
          docker run -d \
            --name youtube-music-bot-dast \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e LOG_LEVEL=INFO \
            -e YTDLP_EXTRACTOR_ARGS="youtube:player_client=android_vr" \
            ${{ env.LOCAL_IMAGE_NAME }}

      - name: Wait for application
        run: |
          echo "Waiting for http://localhost:3000 ..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if echo "$STATUS" | grep -qE "^[2-4]"; then
              echo "Application is up with HTTP $STATUS"
              exit 0
            fi
            sleep 3
          done

          echo "Application did not start in time."
          docker logs youtube-music-bot-dast || true
          exit 1

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "http://localhost:3000"
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-a -I"

      - name: Save application logs
        if: always()
        run: docker logs youtube-music-bot-dast > app.log 2>&1 || true

      - name: Upload DAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-reports
          path: |
            app.log
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: warn

      - name: Clean up container
        if: always()
        run: docker rm -f youtube-music-bot-dast || true

  # ============================================================
  # Track F：E2E Test
  #
  # E2E 是端到端功能測試
  # 它需要 Build 後的 Docker image 啟動網站
  # 再使用 Playwright / Cypress 等工具模擬使用者流程
  #
  # 注意：
  # - 若 package.json 沒有 test:e2e script，會自動跳過
  # ============================================================
  e2e:
    name: "Track F › E2E Test"
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load -i docker-image.tar

      - name: Start application container
        run: |
          docker run -d \
            --name youtube-music-bot-e2e \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e LOG_LEVEL=INFO \
            -e YTDLP_EXTRACTOR_ARGS="youtube:player_client=android_vr" \
            ${{ env.LOCAL_IMAGE_NAME }}

      - name: Wait for application
        run: |
          echo "Waiting for http://localhost:3000 ..."
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if echo "$STATUS" | grep -qE "^[2-4]"; then
              echo "Application is up with HTTP $STATUS"
              exit 0
            fi
            sleep 3
          done

          echo "Application did not start in time."
          docker logs youtube-music-bot-e2e || true
          exit 1

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.devDependencies && p.devDependencies['@playwright/test'] ? 0 : 1)" 2>/dev/null; then
            bunx playwright install --with-deps
          else
            echo "Playwright is not installed. Skipping browser installation."
          fi

      - name: Run E2E tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts['test:e2e'] ? 0 : 1)" 2>/dev/null; then
            bun run test:e2e
          else
            echo "No test:e2e script found. Skipping E2E tests."
          fi

      - name: Upload E2E reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn

      - name: Clean up container
        if: always()
        run: docker rm -f youtube-music-bot-e2e || true

  # ============================================================
  # Final Summary
  # ============================================================
  summary:
    name: "Final › DevSecOps Summary"
    runs-on: ubuntu-latest

    needs:
      - pre_build_checks
      - sca_source
      - build
      - sca_image
      - dast
      - e2e

    if: always()

    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4.1.3
        with:
          path: reports
        continue-on-error: true

      - name: Generate final summary
        run: |
          echo "## Integrated DevSecOps CI Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Pipeline Structure" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`text" >> "$GITHUB_STEP_SUMMARY"
          echo "Pre-Build Checks ────────────────┐" >> "$GITHUB_STEP_SUMMARY"
          echo "├─ Format / Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "├─ Unit Test" >> "$GITHUB_STEP_SUMMARY"
          echo "├─ Integration Test" >> "$GITHUB_STEP_SUMMARY"
          echo "└─ SAST" >> "$GITHUB_STEP_SUMMARY"
          echo "                                 │" >> "$GITHUB_STEP_SUMMARY"
          echo "SCA-Source ─────────────────────┤" >> "$GITHUB_STEP_SUMMARY"
          echo "                                 ├── Final Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Build ───→ SCA-Image ───────────┤" >> "$GITHUB_STEP_SUMMARY"
          echo "        ├→ DAST ────────────────┤" >> "$GITHUB_STEP_SUMMARY"
          echo "        └→ E2E ─────────────────┘" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Job Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage | Result | Description |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-Build Checks | ${{ needs.pre_build_checks.result }} | Format, Lint, Unit Test, Integration Test, SAST |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SCA-Source | ${{ needs.sca_source.result }} | Snyk, Syft source SBOM, Grype source scan |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | ${{ needs.build.result }} | Build application and Docker image |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SCA-Image | ${{ needs.sca_image.result }} | Docker image SBOM and vulnerability scan |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DAST | ${{ needs.dast.result }} | OWASP ZAP scan on running application |" >> "$GITHUB_STEP_SUMMARY"
          echo "| E2E | ${{ needs.e2e.result }} | End-to-End functional test |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Generated Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -d reports ]; then
            find reports -maxdepth 3 -type f | sort | sed 's/^/- /' >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "No reports downloaded." >> "$GITHUB_STEP_SUMMARY"
          fi

