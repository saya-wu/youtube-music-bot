name: Docker Image

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: bs10081/youtube-music-bot

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read build metadata
        id: build_meta
        run: |
          app_version=$(node -p 'JSON.parse(require("fs").readFileSync("package.json", "utf8")).version')
          git_sha_short=$(git rev-parse --short "$GITHUB_SHA")
          {
            echo "app_version=$app_version"
            echo "git_sha_short=$git_sha_short"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.version=${{ steps.build_meta.outputs.app_version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            APP_VERSION=${{ steps.build_meta.outputs.app_version }}
            APP_GIT_SHA=${{ steps.build_meta.outputs.git_sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
